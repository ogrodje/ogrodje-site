name: "Ogrodje Site Build"
on:
  schedule:
    - cron: '0 */12 * * *' # use https://crontab.guru/

  push: { branches: [ master ] }
  pull_request: { branches: [ master ] }
  repository_dispatch: { branches: [ master ] }
  workflow_dispatch:

env:
  GOO_ENDPOINT: https://goo.ogrodje.si
  HYGRAPH_ENDPOINT: ${{ secrets.HYGRAPH_ENDPOINT }}
  KEYCLOAK_CLIENT_ID: ogrodje-platform
  KEYCLOAK_REALM: Ogrodje
  KEYCLOAK_URL: https://keycloak.ogrodje.si
  NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
  NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
  SEARCH_ENDPOINT: https://search.ogrodje.si


jobs:
  build:
    name: "Build"
    environment: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'yarn'
      - run: yarn install --immutable
      - run: yarn build
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  deploy-production:
    name: "Deploy Production"
    needs: build
    if: github.ref == 'refs/heads/master' && github.event_name != 'pull_request'
    environment: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'yarn'
      - run: yarn install --immutable
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: "Deploy to Production"
        run: |
          ./node_modules/.bin/netlify deploy \
            --site $NETLIFY_SITE_ID \
            --auth $NETLIFY_AUTH_TOKEN \
            --prod

  deploy-preview:
    name: "Deploy Preview"
    needs: build
    if: github.event_name == 'pull_request'
    environment: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'yarn'
      - run: yarn install --immutable
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: "Deploy Preview"
        id: netlify-preview
        run: |
          OUTPUT=$(./node_modules/.bin/netlify deploy \
            --site $NETLIFY_SITE_ID \
            --auth $NETLIFY_AUTH_TOKEN)
          echo "$OUTPUT"
          DEPLOY_URL=$(echo "$OUTPUT" | grep -i "Website draft URL:" | awk '{print $NF}')
          echo "deploy_url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
      - uses: actions/github-script@v9
        with:
          script: |
            const deployUrl = '${{ steps.netlify-preview.outputs.deploy_url }}';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `🚀 **Netlify Preview Deploy**\n\n${deployUrl}`
            });
